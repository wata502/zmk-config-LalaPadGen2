# Dongle-only configuration.

# The dongle is powered over USB, so never sleep (sleeping would drop the link
# to the halves).
CONFIG_ZMK_SLEEP=n

# ZMK Studio runs on the dongle, talking to the host over USB (paired with the
# studio-rpc-usb-uart snippet in build.yaml).
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# The dongle has no PCB RGB LEDs (those are on the halves), so disable the
# RGB widget here to avoid referencing missing led-red/green/blue aliases.
# A dongle status LED using the XIAO's on-board LED can be added later.
CONFIG_RGBLED_WIDGET=n
