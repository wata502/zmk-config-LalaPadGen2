# Dongle-only configuration.

# The dongle is powered over USB, so never sleep (sleeping would drop the link
# to the halves).
CONFIG_ZMK_SLEEP=n

# ZMK Studio runs on the dongle, talking to the host over USB (paired with the
# studio-rpc-usb-uart snippet in build.yaml).
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Status LED on the dongle, driven by the XIAO's on-board RGB LED (aliases set
# in lalapadgen2_dongle.overlay). Shows boot/connection status; since the dongle
# talks to the host over USB, show cyan while USB has priority so a lit LED
# confirms the dongle is alive and active.
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_CONN_SHOW_USB=y
