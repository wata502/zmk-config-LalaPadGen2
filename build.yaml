---
include:
  # Dongle (central): bare XIAO nRF52840 (Plus) plugged into the host over USB.
  - board: xiao_ble
    shield: lalapadgen2_dongle
    snippet: studio-rpc-usb-uart
  # Diagnostic dongle: keeps the working studio USB setup AND adds USB serial
  # logging, so the BLE central scan / peripheral connection can be observed.
  - board: xiao_ble
    shield: lalapadgen2_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y -DCONFIG_ZMK_LOG_LEVEL_DBG=y -DCONFIG_BT_LOG_LEVEL_INF=y
    artifact-name: lalapadgen2_dongle_log
  # Both halves are peripherals (role is forced in Kconfig.defconfig).
  - board: xiao_ble
    shield: lalapadgen2_right rgbled_adapter
  - board: xiao_ble
    shield: lalapadgen2_left rgbled_adapter
  - board: xiao_ble
    shield: settings_reset
