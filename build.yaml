---
include:
  # Dongle (central): bare XIAO nRF52840 (Plus) plugged into the host over USB.
  - board: xiao_ble
    shield: lalapadgen2_dongle
    snippet: studio-rpc-usb-uart
  # Diagnostic dongle build: USB serial logging instead of Studio, to inspect
  # BLE central scanning / peripheral connection over the USB CDC console.
  - board: xiao_ble
    shield: lalapadgen2_dongle
    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y -DCONFIG_ZMK_USB=y -DCONFIG_ZMK_STUDIO=n
    artifact-name: lalapadgen2_dongle_debug
  # Halves are now peripherals. -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n flips the right
  # half (which used to be the central) to peripheral; the left was already one.
  - board: xiao_ble
    shield: lalapadgen2_right rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: xiao_ble
    shield: lalapadgen2_left rgbled_adapter
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: xiao_ble
    shield: settings_reset
